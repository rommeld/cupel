[package]
name = "cupel"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "cupel"
path = "src/main.rs"

[lib]
name = "cupel"
path = "src/lib.rs"

[dependencies]
core-text = "=21.0.0"
gpui = { version = "*" }
thiserror = "2"
unicode-segmentation = "1.12.0"

[dev-dependencies]
gpui = { version = "*", features = ["test-support"] }
