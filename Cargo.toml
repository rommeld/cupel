[package]
name = "cupel"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "cupel"
path = "src/main.rs"

[lib]
name = "cupel"
path = "src/lib.rs"

[dependencies]
git2 = "0.20"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["process", "rt-multi-thread"] }
