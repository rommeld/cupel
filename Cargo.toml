[package]
name = "cupel"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "cupel"
path = "src/main.rs"

[lib]
name = "cupel"
path = "src/lib.rs"

[dependencies]
prost = "0.13"
sysinfo = "0.30"
tokio = { version = "1", features = ["process", "rt-multi-thread"] }
tokio-stream = { version = "0.1", features = ["net"] }
tonic = "0.12"

[build-dependencies]
tonic-build = "0.12"
