[package]
name = "cupel"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "cupel"
path = "src/main.rs"

[lib]
name = "cupel"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
core-text = "=21.0.0"
git2 = "0.20"
gpui = "0.2.1"
imara-diff = "0.1"
rust-embed = "8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
smol = "2"
tokio = { version = "1", features = ["process", "rt-multi-thread"] }
unicode-segmentation = "1.12.0"

[dev-dependencies.tempfile]
version = "3"

[dev-dependencies]
gpui = { version = "0.2.1", features = ["test-support"] }
