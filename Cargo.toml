[package]
name = "cupel"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "cellar-client"
path = "src/client.rs"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
prost = "0.13"
rusqlite = { version = "0.39", features = ["bundled"] }
thiserror = "2.0"
tokio = { version = "1", features = ["process", "rt-multi-thread"] }
tokio-stream = { version = "0.1", features = ["net"] }
tonic = "0.12"

[build-dependencies]
tonic-build = "0.12"

[dependencies.uuid]
version = "1.23.0"
features = ["v4",]
